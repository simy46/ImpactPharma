- id: Q1
  category: General Information
  question: Can you identify the year of publication of the study, taking the most recent year mentioned in the text if several dates are provided?
  type: date YYYY

- id: Q2
  category: General Information
  question: From which country does the study originate?
  type: text

- id: Q3
  category: General Information
  question: In what type of healthcare setting was the study conducted?
  type: choice
  options:
    - Hospital
    - Outpatient clinic
    - Community pharmacy  
    - Mixed several of the above
    - Other

- id: Q4
  category: General Information
  question: Is the study single-center or multicenter?
  type: choice
  options:
    - Single-center
    - Multicenter
    - Not specified

- id: Q5
  category: General Information
  question: What are the start and end dates of the study, and what is its duration?
  type: "start date - end date (duration: X ...)"

- id: Q6
  category: General Information
  question: What is the study design?
  type: choice
  options:
    - Randomized controlled trial
    - Cohort study
    - Before-after study
    - Observational study no intervention
    - Qualitative study
    - Survey
    - Expert opinion
    - Other

- id: Q7
  category: Methodology
  question: What is the temporality of the study?
  type: choice
  options:
    - Retrospective
    - Prospective
    - Cross-sectional
    - Other

- id: Q8
  category: Methodology
  question: What are the objectives of the study, including the primary and secondary objectives?
  type: text

- id: Q9
  category: Methodology
  question: How many groups are being studied?
  type: number

- id: Q10
  category: Methodology
  question: Is there a control group?
  type: choice
  options:
    - "Yes"
    - "No"

- id: Q11
  category: Methodology
  question: How are the participants allocated?
  type: choice
  options:
    - Random
    - Non-random
    - Quasi-random

- id: Q12
  category: Methodology
  question: What are the inclusion criteria for participants?
  type: text

- id: Q13
  category: Methodology
  question: What are the exclusion criteria for participants?
  type: text

- id: Q14
  category: Methodology
  question: What is the blinding method used in the study?
  type: choice
  options:
    - Single-blind
    - Double-blind
    - No blinding

- id: Q15
  category: Outcomes
  question: Describe all the outcomes, primary and secondary. Be sure to indicate their status in brackets.
  type: text

- id: Q16
  category: Outcomes
  question: >
    What are the results for the outcomes, primary and secondary?
    Also clearly indicate whether these results are statistically significant,
    and link each parameter to the evaluation target: does it help evaluate a
    structure, a process, or an outcome? Mapping of recorded parameters to the
    category of indicators to which they belong: Is this a parameter that
    measures adherence, morbidity, mortality, cost, errors, adverse effects,
    satisfaction, or other factors?
  type: |
    yaml list in string. each item must follow exactly this structure:
      - Description:
        Results:
        Significance: Yes / No / Not specified
        Parameter:
        marker category:

- id: Q17
  category: Pharmaceutical Intervention
  question: >
    Describe the pharmaceutical intervention, including the role of the pharmacist.
    Describe each action starting with a verb. Include how the intervention is
    implemented, what concrete actions are carried out, in which actions or
    processes the pharmacist is involved, and make sure each action begins with a verb.
  type: text

- id: Q18
  category: Pharmaceutical Intervention
  question: Where does the pharmaceutical intervention take place?
  type: text

- id: Q19
  category: Pharmaceutical Intervention
  question: >
    Who are the stakeholders involved in the intervention?
    Examples: nurses, specialist doctors, pharmacy technicians, community pharmacists,
    clinical pharmacists, etc.
  type: text

- id: Q20
  category: Pharmaceutical Intervention
  question: What is the duration of the intervention?
  type: "start date - end date (duration: X ...)"

- id: Q21
  category: Limitations
  question: What are the limitations or weaknesses of the study as identified by the authors?
  type: yaml list in string

- id: Q22
  category: Tools
  question: >
    What tools are used in the articles to assess the various variables?
    Examples: International Normalized Ratio, AMPLE Method, Medication Appropriateness Index.
    Please mention them only if they are essential for measuring the primary outcome measures.
  type: text